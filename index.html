<!DOCTYPE html>
<html>
<head>
  <title>WashU Head & Neck Staffing</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    h1 { margin-bottom: 10px; }
    table { border-collapse: collapse; margin-top: 10px; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
    button { margin: 5px; padding: 8px 12px; }
    select { padding: 6px; margin-right: 10px; }
    .next-up { background-color: #e0ffe0; font-weight: bold; }
  </style>
</head>
<body>

<h1>WashU Head & Neck Staffing</h1>

<select id="physicianSelect"></select>
<button onclick="assignConsultToSelected()">Assign Consult</button>
<button onclick="unassignConsult()">Unassign Consult</button>
<button onclick="resetCounts()">Reset Counts</button>

<h4>🕒 Last Reset: <span id="lastReset">Never</span></h4>

<h3>📌 Most Recent Consult: <span id="lastAssigned">None</span></h3>
<h3>➡️ Next Up: <span id="nextUp">None</span></h3>

<table id="table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Consult Count</th>
      <th>Last Assigned</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>

<script>
  // ===== Firebase Config =====
  const firebaseConfig = {
    apiKey: "AIzaSyAhgnZwNSE5nat94Tzy6I195wjRu7V1ITM",
    authDomain: "washuhn.firebaseapp.com",
    projectId: "washuhn",
    storageBucket: "washuhn.firebasestorage.app",
    messagingSenderId: "509224114115",
    appId: "1:509224114115:web:27a7824bdfba4d4e45cf76"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ===== Predefined physicians (alphabetical) =====
  const defaultPhysicians = ["Harbison","Jackson","Pipkorn","Puram","Rich","Wahle"];
  let physicians = [];
  let lastReset = null;

  // ===== Ensure physicians exist in Firestore =====
  async function initializePhysicians() {
    for (const name of defaultPhysicians) {
      const docRef = db.collection('physicians').doc(name);
      const doc = await docRef.get();
      if (!doc.exists) {
        await docRef.set({ count: 0, lastAssigned: "" });
      }
    }
    const resetDoc = await db.collection('metadata').doc('reset').get();
    if (!resetDoc.exists) {
      await db.collection('metadata').doc('reset').set({ lastReset: "" });
    }
  }

  // ===== Start app and listen for changes =====
  async function startApp() {
    await initializePhysicians();

    db.collection('physicians').onSnapshot(snapshot => {
      physicians = snapshot.docs.map(doc => ({
        name: doc.id,
        count: doc.data().count,
        lastAssignedTime: doc.data().lastAssigned
      }));
      physicians.sort((a,b) => a.name.localeCompare(b.name));
      populateDropdown();
      render();
    });

    db.collection('metadata').doc('reset').onSnapshot(doc => {
      lastReset = doc.data().lastReset;
      document.getElementById("lastReset").innerText = lastReset || "Never";
    });
  }

  function populateDropdown() {
    const select = document.getElementById("physicianSelect");
    select.innerHTML = "";
    physicians.forEach(p => {
      const option = document.createElement("option");
      option.value = p.name;
      option.innerText = p.name;
      select.appendChild(option);
    });
  }

  function render() {
    const nextUpPhysician = getNextUp();
    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";
    physicians.forEach(p => {
      const row = document.createElement("tr");
      if (p.name === nextUpPhysician?.name) row.classList.add("next-up");
      row.innerHTML = `
        <td>${p.name}</td>
        <td>${p.count}</td>
        <td>${p.lastAssignedTime || ''}</td>
      `;
      tbody.appendChild(row);
    });

    document.getElementById("lastAssigned").innerText = getMostRecentConsult();
    document.getElementById("nextUp").innerText = nextUpPhysician?.name || "None";
  }

  function getNextUp() {
    if (physicians.length === 0) return null;
    const minCount = Math.min(...physicians.map(p => p.count));
    const eligible = physicians.filter(p => p.count === minCount)
                               .sort((a,b) => a.name.localeCompare(b.name));
    return eligible[0];
  }

  function getMostRecentConsult() {
    if (physicians.length === 0) return "None";
    const withTimestamps = physicians.filter(p => p.lastAssignedTime);
    if (withTimestamps.length === 0) return "None";
    withTimestamps.sort((a,b) => new Date(b.lastAssignedTime) - new Date(a.lastAssignedTime));
    return withTimestamps[0].name;
  }

  // ===== Assign Consult =====
  async function assignConsultToSelected() {
    const selectedName = document.getElementById("physicianSelect").value;
    const physician = physicians.find(p => p.name === selectedName);
    if (!physician) return;

    const now = new Date();
    await db.collection('physicians').doc(selectedName).set({
      count: physician.count + 1,
      lastAssigned: now.toLocaleString()
    }, { merge: true });
  }

  // ===== Unassign Consult with confirmation =====
  async function unassignConsult() {
    const selectedName = document.getElementById("physicianSelect").value;
    const physician = physicians.find(p => p.name === selectedName);
    if (!physician) return;

    const confirmUnassign = confirm(`⚠️ Are you sure you want to unassign a consult for ${selectedName}?`);
    if (!confirmUnassign) return;

    const newCount = Math.max(physician.count - 1, 0);
    await db.collection('physicians').doc(selectedName).set({
      count: newCount,
      lastAssigned: newCount === 0 ? "" : physician.lastAssignedTime
    }, { merge: true });
  }

  // ===== Reset Counts with confirmation =====
  async function resetCounts() {
    const confirmReset = confirm("⚠️ Are you sure you want to reset all consult counts? This cannot be undone!");
    if (!confirmReset) return;

    const now = new Date();
    for (let p of physicians) {
      await db.collection('physicians').doc(p.name).set({
        count: 0,
        lastAssigned: ""
      }, { merge: true });
    }
    const timestampStr = now.toLocaleString();
    await db.collection('metadata').doc('reset').set({ lastReset: timestampStr });
  }

  startApp();
</script>

</body>
</html>
