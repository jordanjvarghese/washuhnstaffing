<!DOCTYPE html>
<html>
<head>
  <title>Consult Wheel (Working)</title>
  <style>
    body { font-family: Arial; text-align: center; }

    .wheel-container {
      position: relative;
      width: 350px;
      margin: 20px auto;
    }

    canvas {
      border-radius: 50%;
      border: 8px solid #333;
    }

    .pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 30px;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>🎡 Shared Consult Wheel</h2>

<div class="wheel-container">
  <div class="pointer">▼</div>
  <canvas id="wheel" width="350" height="350"></canvas>
</div>

<button onclick="spin()">SPIN</button>

<h3 id="result"></h3>

<script type="module">
// ✅ MODERN FIREBASE IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔧 PASTE YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyAhgnZwNSE5nat94Tzy6I195wjRu7V1ITM",
  authDomain: "washuhn.firebaseapp.com",
  projectId: "washuhn",
  storageBucket: "washuhn.firebasestorage.app",
  messagingSenderId: "509224114115",
  appId: "1:509224114115:web:27a7824bdfba4d4e45cf76"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const names = ["Puram","Pipkorn","Jackson","Rich","Wahle"];
const colors = ["#FF6B6B","#4ECDC4","#FFD93D","#A29BFE","#55EFC4"];

let counts = {};

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let angle = 0;

// 🎨 DRAW WHEEL
function drawWheel() {
  const arc = (2 * Math.PI) / names.length;

  for (let i = 0; i < names.length; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(175, 175);
    ctx.arc(175, 175, 175, i * arc, (i + 1) * arc);
    ctx.fill();

    ctx.save();
    ctx.translate(175, 175);
    ctx.rotate(i * arc + arc / 2);
    ctx.fillStyle = "#000";
    ctx.fillText(names[i], 100, 5);
    ctx.restore();
  }
}

// 🔄 FIREBASE HELPERS
async function getCounts() {
  const ref = doc(db, "wheel", "counts");
  const snap = await getDoc(ref);
  return snap.exists() ? snap.data() : {};
}

async function saveCounts(c) {
  const ref = doc(db, "wheel", "counts");
  await setDoc(ref, c);
}

// ⚖️ FAIR PICK
function pickFair() {
  let min = Math.min(...Object.values(counts));
  let candidates = names.filter(n => counts[n] === min);
  return candidates[Math.floor(Math.random() * candidates.length)];
}

// 🎡 SPIN
window.spin = async function() {
  counts = await getCounts();
  names.forEach(n => { if (!counts[n]) counts[n] = 0; });

  let winner = pickFair();
  let index = names.indexOf(winner);

  const arc = 360 / names.length;
  const targetAngle = (360 - index * arc) + (arc / 2);

  let spinAngle = 360 * 5 + targetAngle;
  let duration = 2000;
  let start = null;

  function animate(timestamp) {
    if (!start) start = timestamp;
    let progress = timestamp - start;

    let current = easeOut(progress, 0, spinAngle, duration);
    angle = current % 360;

    ctx.clearRect(0, 0, 350, 350);
    ctx.save();
    ctx.translate(175,175);
    ctx.rotate(angle * Math.PI / 180);
    ctx.translate(-175,-175);
    drawWheel();
    ctx.restore();

    if (progress < duration) {
      requestAnimationFrame(animate);
    } else {
      finish(winner);
    }
  }

  requestAnimationFrame(animate);
};

// 🧠 EASING
function easeOut(t, b, c, d) {
  t /= d;
  return -c * t*(t-2) + b;
}

// ✅ FINISH
async function finish(winner)
  counts[winner]++;
  await saveCounts(counts);

  document.getElementById("result").innerHTML =
    "<b>Today's attending: " + winner + "</b><br><br>" +
    Object.entries(counts).map(([k,v]) => k + ": " + v).join("<br>");
}

// INITIAL DRAW
drawWheel();
</script>

</body>
</html>
