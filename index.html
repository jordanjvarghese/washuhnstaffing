<!DOCTYPE html>
<html>
<head>
  <title>Consult Wheel (Shared)</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</head>
<body style="text-align:center; font-family:Arial;">

<h2>🎡 Shared Consult Wheel</h2>
<button onclick="spin()">SPIN</button>
<h3 id="result"></h3>

<script>
// 🔧 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyAhgnZwNSE5nat94Tzy6I195wjRu7V1ITM",
  authDomain: "washuhn.firebaseapp.com",
  projectId: "washuhn",
  storageBucket: "washuhn.firebasestorage.app",
  messagingSenderId: "509224114115",
  appId: "1:509224114115:web:27a7824bdfba4d4e45cf76"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const names = ["Puram","Pipkorn","Jackson","Rich","Wahle","Harbison"];

async function getCounts() {
  let doc = await db.collection("wheel").doc("counts").get();
  return doc.exists ? doc.data() : {};
}

async function saveCounts(counts) {
  await db.collection("wheel").doc("counts").set(counts);
}

async function spin() {
  let counts = await getCounts();

  // Initialize if empty
  names.forEach(n => { if (!counts[n]) counts[n] = 0; });

  let min = Math.min(...Object.values(counts));
  let candidates = names.filter(n => counts[n] === min);
  let choice = candidates[Math.floor(Math.random() * candidates.length)];

  counts[choice]++;

  await saveCounts(counts);

  document.getElementById("result").innerHTML =
    "Today's attending: <b>" + choice + "</b><br><br>" +
    Object.entries(counts).map(([k,v]) => k + ": " + v).join("<br>");
}
</script>

</body>
</html>
